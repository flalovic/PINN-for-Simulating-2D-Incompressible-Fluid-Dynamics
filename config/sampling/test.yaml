domain: 
  x_min: 0.0
  x_max: 1.0
  y_min: 0.0
  y_max: 1.0
  nx_cells: 128
  ny_cells: 128
  mesh_grading: [2, 1, 1]

physics:
  boundary_conditions:
    lid_velocity: [1.0, 0.0, 0.0]
    bottom_wall: "noSlip"

system:
  time_control:
    delta_t: 0.001
    end_time: 0.5
    write_interval: 50
  solver_control:
    momentum_relaxation: 0.7
    pressure_relaxation: 0.3